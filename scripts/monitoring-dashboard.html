<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMental Platform - Monitoring Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            background: linear-gradient(to right, #b121f3, #44eee0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #44eee0;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #94a3b8; }
        .metric-value {
            font-weight: bold;
            color: #e2e8f0;
        }
        .status-healthy { color: #10b981; }
        .status-degraded { color: #f59e0b; }
        .status-unhealthy { color: #ef4444; }
        .refresh-btn {
            background: linear-gradient(to right, #b121f3, #44eee0);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { opacity: 0.9; }
        .loading { text-align: center; color: #94a3b8; }
        .error { color: #ef4444; background: #7f1d1d; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MyMental Platform - Monitoring Dashboard</h1>
        <button class="refresh-btn" onclick="loadMetrics()">🔄 Refresh</button>
        <div id="loading" class="loading">Loading metrics...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="dashboard" class="grid" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let refreshInterval;

        async function loadMetrics() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';

            try {
                const [health, metrics, uptime] = await Promise.all([
                    fetch(`${API_BASE}/health/`).then(r => r.json()),
                    fetch(`${API_BASE}/metrics/`).then(r => r.json()).catch(() => ({})),
                    fetch(`${API_BASE}/uptime/`).then(r => r.json()).catch(() => ({}))
                ]);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                
                renderDashboard(health, metrics, uptime);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading metrics: ${error.message}`;
            }
        }

        function renderDashboard(health, metrics, uptime) {
            const dashboard = document.getElementById('dashboard');
            
            // Health Status
            dashboard.innerHTML = `
                <div class="card">
                    <h2>Health Status</h2>
                    <div class="metric">
                        <span class="metric-label">Overall Status</span>
                        <span class="metric-value status-${health.status}">${health.status.toUpperCase()}</span>
                    </div>
                    ${Object.entries(health.checks || {}).map(([key, value]) => `
                        <div class="metric">
                            <span class="metric-label">${key}</span>
                            <span class="metric-value ${value === 'ok' ? 'status-healthy' : 'status-unhealthy'}">${value}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="card">
                    <h2>Request Metrics</h2>
                    ${Object.entries(metrics.requests || {}).length > 0 
                        ? Object.entries(metrics.requests).map(([endpoint, count]) => `
                            <div class="metric">
                                <span class="metric-label">${endpoint}</span>
                                <span class="metric-value">${count}</span>
                            </div>
                        `).join('')
                        : '<div class="metric"><span class="metric-label">No data</span></div>'
                    }
                </div>

                <div class="card">
                    <h2>Response Times</h2>
                    ${Object.entries(metrics.response_times || {}).length > 0
                        ? Object.entries(metrics.response_times).map(([endpoint, data]) => `
                            <div class="metric">
                                <span class="metric-label">${endpoint}</span>
                                <span class="metric-value">${data.avg_ms}ms avg</span>
                            </div>
                        `).join('')
                        : '<div class="metric"><span class="metric-label">No data</span></div>'
                    }
                </div>

                <div class="card">
                    <h2>Error Metrics</h2>
                    ${Object.entries(metrics.errors || {}).length > 0
                        ? Object.entries(metrics.errors).map(([error, count]) => `
                            <div class="metric">
                                <span class="metric-label">${error}</span>
                                <span class="metric-value status-unhealthy">${count}</span>
                            </div>
                        `).join('')
                        : '<div class="metric"><span class="metric-label">No errors</span></div>'
                    }
                </div>

                ${uptime.system ? `
                    <div class="card">
                        <h2>System Resources</h2>
                        <div class="metric">
                            <span class="metric-label">CPU Usage</span>
                            <span class="metric-value">${uptime.system.cpu_percent.toFixed(1)}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Memory Usage</span>
                            <span class="metric-value">${uptime.system.memory_percent.toFixed(1)}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Disk Usage</span>
                            <span class="metric-value">${uptime.system.disk_percent.toFixed(1)}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Uptime</span>
                            <span class="metric-value">${formatUptime(uptime.uptime_seconds)}</span>
                        </div>
                    </div>
                ` : ''}
            `;
        }

        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            return `${days}d ${hours}h ${mins}m`;
        }

        // Auto-refresh every 30 seconds
        loadMetrics();
        refreshInterval = setInterval(loadMetrics, 30000);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
